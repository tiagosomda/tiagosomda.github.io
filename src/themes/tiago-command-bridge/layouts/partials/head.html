<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070b0e">
<meta name="color-scheme" content="dark">
<title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
<meta name="author" content="{{ .Site.Params.author }}">
<meta name="description" content="{{ .Site.Params.description }}">
<meta name="robots" content="index, follow">
<meta property="og:title" content="{{ .Site.Title }} — Engineer. Explorer. Maker.">
<meta property="og:description" content="{{ .Site.Params.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
{{ with .Site.Params.shareImage }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}
<meta name="twitter:card" content="summary_large_image">
{{ with .Site.Params.twitterHandle }}<meta name="twitter:site" content="@{{ . }}">{{ end }}
{{ with .Site.Params.favicon }}<link rel="icon" href="{{ . | relURL }}">{{ end }}
<link rel="preconnect" href="https://notes.tiago.dev">
{{ $assetVersion := now.Unix }}
<link rel="stylesheet" href="{{ "css/command-bridge.css" | relURL }}?v={{ $assetVersion }}">
<script defer src="{{ "js/command-bridge.js" | relURL }}?v={{ $assetVersion }}" data-feed="{{ .Site.Params.feedURL }}"></script>
